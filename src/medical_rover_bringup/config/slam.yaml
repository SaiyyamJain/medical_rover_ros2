slam_toolbox:
  ros__parameters:


    use_sim_time: true

    odom_frame: odom
    map_frame: map
    base_frame: base_link

    scan_topic: /scan

    mode: mapping

    resolution: 0.05

    publish_period_secf: 0.5

    transform_publish_period: 0.02

    map_update_interval: 2.0

    max_laser_range: 12.0

